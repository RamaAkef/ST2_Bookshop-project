version: "3.9"

services:
  db:
    image: postgres:15
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bookshop_network

  backend:
    build: .
    env_file: .env
    volumes:
      - static_volume:/app/staticfiles
    depends_on:
      - db
    networks:
      - bookshop_network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/staticfiles
    depends_on:
      - backend
    networks:
      - bookshop_network
      
volumes:
  postgres_data:
  static_volume:

networks:
  bookshop_network:
    driver: bridge