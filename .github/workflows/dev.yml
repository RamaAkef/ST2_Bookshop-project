name: dev — artifact-first

on:
  push:
    branches: [dev]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies into venv
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}

      - name: Collect static files
        run: |
          source venv/bin/activate
          python manage.py collectstatic --noinput
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DATABASE_URL: sqlite:///tmp/build.db

      - name: Package artifact
        run: |
          ARTIFACT="app-${{ github.sha }}.tar.gz"
          tar -czf "$ARTIFACT" \
            --exclude='.git' \
            --exclude='artifacts' \
            --exclude='*.pyc' \
            --exclude='__pycache__' \
            --exclude="$ARTIFACT" \
            .
          echo "ARTIFACT=$ARTIFACT" >> $GITHUB_ENV

      - name: Commit artifact to artifacts/ folder
        run: |
          mkdir -p artifacts
          cp "$ARTIFACT" artifacts/
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add artifacts/"$ARTIFACT"
          git commit -m "ci: add artifact $ARTIFACT [skip ci]"
          git push origin dev

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image from artifact
        run: |
          docker build \
            --build-arg ARTIFACT_NAME="$ARTIFACT" \
            -t ${{ vars.REGISTRY_NAME }}/${{ vars.IMAGE_NAME }}:dev-${{ github.sha }} \
            -t ${{ vars.REGISTRY_NAME }}/${{ vars.IMAGE_NAME }}:dev-latest \
            .

      - name: Push image to Docker Hub
        run: |
          docker push ${{ vars.REGISTRY_NAME }}/${{ vars.IMAGE_NAME }}:dev-${{ github.sha }}
          docker push ${{ vars.REGISTRY_NAME }}/${{ vars.IMAGE_NAME }}:dev-latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/deployments/dev
            sed -i 's/IMAGE_TAG=.*/IMAGE_TAG=dev-${{ github.sha }}/' .env
            docker compose -p dev pull
            docker compose -p dev up -d --remove-orphans